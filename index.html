<!DOCTYPE html>
<html lang="tr" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <meta name="description" content="Dijital Karargâh — Ajanda ve Görev Yönetim Komuta Merkezi" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Karargâh" />

  <title>Dijital Karargâh</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/style.css" />

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <!-- Toast bildirimleri -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- ─── AUTH OVERLAY ──────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-emblem" aria-hidden="true">⚔️</div>
      <h1 class="auth-title">Dijital Karargâh</h1>
      <p class="auth-subtitle">Komuta Merkezine Giriş</p>

      <div class="auth-tabs">
        <button class="auth-tab auth-tab--active" data-tab="login" type="button">Giriş Yap</button>
        <button class="auth-tab" data-tab="register" type="button">Kayıt Ol</button>
      </div>

      <form id="auth-form" novalidate>
        <div class="form-group">
          <input type="email" id="auth-email" class="form-input" placeholder="E-posta adresiniz" required
            autocomplete="email" />
        </div>
        <div class="form-group">
          <input type="password" id="auth-password" class="form-input" placeholder="Şifre (min 6 karakter)" required
            minlength="6" autocomplete="current-password" />
        </div>
        <button type="submit" id="auth-submit" class="btn-submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" />
          </svg>
          <span id="auth-submit-text">Giriş Yap</span>
        </button>
        <p id="auth-error" class="auth-error" role="alert"></p>
      </form>
    </div>
  </div>

  <!-- ─── ANA SARMALAYICI ───────────────────────── -->
  <div id="app-main" class="app-wrapper" style="display:none;">

    <!-- ─── HEADER ─────────────────────────────────── -->
    <header class="app-header">
      <div class="header-brand">
        <div class="brand-emblem" aria-hidden="true">⚔️</div>
        <div class="brand-text">
          <span class="brand-name">Dijital Karargâh</span>
          <span class="brand-sub">Komuta Merkezi</span>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Tema değiştir" title="Tema Değiştir">
          <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">🌙</span>
          <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">☀️</span>
        </button>
      </div>

      <!-- User Bar -->
      <div id="user-bar" class="user-bar" style="display:none;">
        <div class="user-info">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span id="user-email" class="user-email"></span>
        </div>
        <button id="btn-logout" class="btn-logout" type="button">Çıkış</button>
      </div>

      <div class="header-greeting">
        <h1 class="greeting-title">
          <span id="greeting">Hoş Geldin, Komutan</span>
        </h1>
        <time id="date-display" class="date-display" aria-label="Bugünün tarihi"></time>
      </div>
    </header>

    <!-- ─── İSTATİSTİK BARI ───────────────────────── -->
    <section class="stats-bar" aria-label="Görev istatistikleri">
      <div class="stat-card">
        <span id="stat-total" class="stat-value">0</span>
        <span class="stat-label">Toplam</span>
      </div>
      <div class="stat-card">
        <span id="stat-done" class="stat-value">0</span>
        <span class="stat-label">Tamamlanan</span>
      </div>
      <div class="stat-card">
        <span id="stat-pending" class="stat-value">0</span>
        <span class="stat-label">Bekleyen</span>
      </div>
    </section>

    <!-- ─── PROGRESS BAR ──────────────────────────── -->
    <div class="progress-bar-container">
      <div class="progress-bar__track">
        <div id="progress-fill" class="progress-bar__fill" style="width:0%"></div>
      </div>
      <span id="progress-text" class="progress-bar__text">0%</span>
    </div>

    <!-- ─── FİLTRE ÇUBUĞU ────────────────────────── -->
    <nav class="filter-bar" role="tablist" aria-label="Görev filtreleri">
      <button class="filter-btn filter-btn--active" role="tab" data-filter="all" aria-selected="true">Tümü</button>
      <button class="filter-btn" role="tab" data-filter="belediye" aria-selected="false">🏛️ Belediye</button>
      <button class="filter-btn" role="tab" data-filter="akademi" aria-selected="false">🎓 Akademi</button>
      <button class="filter-btn" role="tab" data-filter="stk" aria-selected="false">🌱 STK</button>
      <button class="filter-btn" role="tab" data-filter="kisisel" aria-selected="false">⚡ Kişisel</button>
    </nav>

    <!-- ─── GÖRÜNÜM SEKMELERİ ─────────────────────── -->
    <div class="view-tabs">
      <button class="view-tab view-tab--active" data-view="grid" type="button">📋 Liste</button>
      <button class="view-tab" data-view="calendar" type="button">📅 Takvim</button>
    </div>

    <!-- ─── GÖREV LİSTESİ ─────────────────────────── -->
    <div id="grid-section" class="grid-section">
      <div class="section-header">
        <h2 class="section-title">Aktif Görevler</h2>
        <div class="section-line" aria-hidden="true"></div>
      </div>
      <main id="task-grid" class="task-grid" role="list" aria-label="Görev listesi"></main>
      <div id="empty-state" class="empty-state" style="display:none;" role="status">
        <div class="empty-state__icon" aria-hidden="true">🎯</div>
        <p class="empty-state__title">Karargâh Temiz</p>
        <p class="empty-state__sub">Yeni bir görev eklemek için + butonuna bas</p>
      </div>
    </div>

    <!-- ─── TAKVİM ────────────────────────────────── -->
    <div id="calendar-section" class="calendar-section" style="display:none;">
      <div class="calendar-nav">
        <button id="cal-prev" class="cal-nav-btn" type="button" aria-label="Önceki ay">‹</button>
        <h2 id="cal-title" class="cal-title"></h2>
        <button id="cal-next" class="cal-nav-btn" type="button" aria-label="Sonraki ay">›</button>
      </div>
      <div class="calendar-grid">
        <div class="cal-day-header">Pzt</div>
        <div class="cal-day-header">Sal</div>
        <div class="cal-day-header">Çar</div>
        <div class="cal-day-header">Per</div>
        <div class="cal-day-header">Cum</div>
        <div class="cal-day-header">Cmt</div>
        <div class="cal-day-header">Paz</div>
      </div>
      <div id="cal-days" class="calendar-grid calendar-days"></div>
    </div>

  </div>
  <!-- /app-wrapper -->

  <!-- ─── FLOATING ACTION BUTTON ────────────────── -->
  <button id="fab" class="fab" aria-label="Yeni görev ekle" title="Yeni Görev Ekle">
    <span class="fab__icon" aria-hidden="true">+</span>
  </button>

  <!-- ─── MODAL OVERLAY ──────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay"></div>

  <!-- ─── YENİ GÖREV MODALI (SaaS) ────────────── -->
  <div id="modal" class="modal" role="dialog" aria-labelledby="modal-heading" aria-modal="true">

    <!-- Modal Header -->
    <div class="modal-header">
      <div class="modal-header__left">
        <span class="modal-header__icon">🚀</span>
        <h2 id="modal-heading" class="modal-title">Yeni Operasyon</h2>
      </div>
      <button id="modal-close" class="modal-close" aria-label="Kapat" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <form id="task-form" class="modal-form" novalidate>
      <input type="hidden" id="selected-category" name="category" />

      <!-- Görev Başlığı -->
      <div class="form-group">
        <label class="form-label" for="input-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          Görev Başlığı
        </label>
        <input id="input-title" name="title" type="text" class="form-input form-input--lg"
          placeholder="Örn: Projeyi teslim et, Raporu gözden geçir…" maxlength="180" autocomplete="off" required />
      </div>

      <!-- Kategori — Chip/Badge butonları -->
      <div class="form-group">
        <label class="form-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" />
            <line x1="7" y1="7" x2="7.01" y2="7" />
          </svg>
          Kategori
        </label>
        <div class="chip-group">
          <button type="button" class="chip" data-category="belediye"
            style="--chip-color:#2196F3;--chip-bg:rgba(33,150,243,0.12)">
            <span class="chip__icon">🏛️</span> Belediye
          </button>
          <button type="button" class="chip" data-category="akademi"
            style="--chip-color:#9C27B0;--chip-bg:rgba(156,39,176,0.12)">
            <span class="chip__icon">🎓</span> Akademi
          </button>
          <button type="button" class="chip" data-category="stk"
            style="--chip-color:#4CAF50;--chip-bg:rgba(76,175,80,0.12)">
            <span class="chip__icon">🌱</span> STK
          </button>
          <button type="button" class="chip" data-category="kisisel"
            style="--chip-color:#F44336;--chip-bg:rgba(244,67,54,0.12)">
            <span class="chip__icon">⚡</span> Kişisel
          </button>
        </div>
      </div>

      <!-- Tarih/Saat & Öncelik -->
      <div class="form-row">
        <div class="form-group form-group--flex">
          <label class="form-label" for="input-datetime">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            Tarih & Saat
          </label>
          <input id="input-datetime" name="dueDate" type="datetime-local" class="form-input" />
        </div>
        <div class="form-group form-group--flex">
          <label class="form-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            Öncelik
          </label>
          <div class="priority-group">
            <button type="button" class="priority-btn priority-btn--low" data-priority="low">🟢 Düşük</button>
            <button type="button" class="priority-btn priority-btn--medium priority-btn--active"
              data-priority="medium">🟡 Orta</button>
            <button type="button" class="priority-btn priority-btn--high" data-priority="high">🔴 Yüksek</button>
          </div>
        </div>
      </div>

      <!-- Görünürlük Toggle + Görevli -->
      <div class="form-group">
        <label class="form-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
          </svg>
          Görünürlük
        </label>
        <div class="visibility-row">
          <div class="toggle-wrapper">
            <label class="toggle-switch">
              <input type="checkbox" id="input-visibility" />
              <span class="toggle-slider"></span>
            </label>
            <span id="visibility-label" class="toggle-label">🔒 Sadece Ben</span>
          </div>
          <div id="assignee-field" class="assignee-field" style="display:none;">
            <input id="input-assignee" name="assignee" type="email" class="form-input" placeholder="ornek@mail.com"
              autocomplete="off" />
          </div>
        </div>
      </div>

      <!-- Aksiyon Butonları -->
      <div class="modal-actions">
        <button type="button" id="modal-cancel" class="btn-cancel">İptal</button>
        <button type="submit" class="btn-submit btn-submit--action">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          Operasyonu Başlat
        </button>
      </div>
    </form>
  </div>

  <!-- ─── UYGULAMA JS ────────────────────────────── -->
  <script type="module" src="/js/app.js"></script>
</body>

</html>
